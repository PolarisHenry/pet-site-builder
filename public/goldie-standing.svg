<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <filter id="fluffy-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#FF8C42" flood-opacity="0.12" />
    </filter>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="100%" stop-color="#F5D061" />
    </linearGradient>
  </defs>

  <g filter="url(#fluffy-shadow)">
    <!-- Back Leg Left -->
    <path d="M 270 230 C 270 290, 260 330, 260 335 C 260 340, 275 340, 275 335 C 275 320, 290 280, 290 230 Z" fill="#FF8C42" opacity="0.8" />
    <!-- Back Paw Left -->
    <ellipse cx="267" cy="336" rx="9" ry="6" fill="#FFFFFF" opacity="0.8" />

    <!-- Front Leg Left -->
    <path d="M 160 230 C 150 280, 145 320, 145 335 C 145 340, 160 340, 160 335 C 160 315, 175 285, 175 230 Z" fill="#FFAD73" opacity="0.8" />
    <!-- Front Paw Left -->
    <ellipse cx="152" cy="336" rx="9" ry="6" fill="#FFFFFF" opacity="0.8" />

    <!-- Tail (Long, Fluffy, wavy) -->
    <path d="M 285 200 C 330 180, 360 120, 345 80 C 335 55, 315 70, 325 95 C 335 120, 310 160, 270 190" fill="none" stroke="#FF8C42" stroke-width="22" stroke-linecap="round" />
    <!-- White Tail Tip -->
    <path d="M 345 80 C 335 55, 315 70, 325 95" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" />

    <!-- Cat Body (Main Torso) -->
    <path d="M 150 210 C 130 190, 290 160, 290 220 C 290 270, 170 260, 150 210 Z" fill="#FF8C42" />
    <!-- White Chest and Belly Patch -->
    <path d="M 145 205 C 160 195, 230 200, 260 220 C 240 250, 160 245, 145 205 Z" fill="#FFFFFF" />

    <!-- Back Leg Right -->
    <path d="M 280 230 C 280 295, 275 335, 275 340 C 275 345, 292 345, 292 340 C 292 325, 305 285, 305 230 Z" fill="#FF8C42" />
    <!-- Back Paw Right -->
    <ellipse cx="283" cy="341" rx="10" ry="6" fill="#FFFFFF" />

    <!-- Front Leg Right -->
    <path d="M 170 230 C 170 285, 165 335, 165 340 C 165 345, 182 345, 182 340 C 182 315, 190 285, 190 230 Z" fill="#FF8C42" />
    <!-- Front Paw Right -->
    <ellipse cx="173" cy="341" rx="10" ry="6" fill="#FFFFFF" />

    <!-- Cat Head -->
    <circle cx="130" cy="155" r="42" fill="#FF8C42" />
    <!-- White Face Mask -->
    <path d="M 95 165 C 95 140, 140 135, 155 155 C 165 168, 115 195, 95 165 Z" fill="#FFFFFF" />

    <!-- Left Ear -->
    <path d="M 100 132 L 85 95 L 118 115 Z" fill="#FF8C42" />
    <path d="M 102 128 L 92 102 L 113 117 Z" fill="#FFAD73" />

    <!-- Right Ear -->
    <path d="M 145 125 L 160 88 L 158 120 Z" fill="#FF8C42" />
    <path d="M 146 122 L 155 96 L 154 118 Z" fill="#FFAD73" />

    <!-- Eyes (Big, Curious, Round) -->
    <!-- Left Eye Outer -->
    <ellipse cx="112" cy="148" rx="7" ry="9" fill="#2D3142" />
    <!-- Left Eye Pupil Highlight -->
    <circle cx="110" cy="145" r="2.5" fill="#FFFFFF" />

    <!-- Right Eye Outer -->
    <ellipse cx="140" cy="145" rx="7" ry="9" fill="#2D3142" />
    <!-- Right Eye Pupil Highlight -->
    <circle cx="138" cy="142" r="2.5" fill="#FFFFFF" />

    <!-- Cute Pink Nose -->
    <polygon points="123,156 129,156 126,159" fill="#FFAD73" />
    <!-- Smiling Mouth -->
    <path d="M 122 162 Q 126 165 130 162" fill="none" stroke="#2D3142" stroke-width="2" stroke-linecap="round" />

    <!-- Whiskers -->
    <line x1="95" y1="162" x2="75" y2="160" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />
    <line x1="95" y1="168" x2="72" y2="171" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />
    <line x1="150" y1="158" x2="170" y2="155" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />
    <line x1="150" y1="164" x2="172" y2="167" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" />

    <!-- Red Collar and Gold Tag -->
    <path d="M 115 192 C 122 195, 138 192, 145 182" fill="none" stroke="#D32F2F" stroke-width="5" stroke-linecap="round" />
    <!-- Shiny Gold Medallion -->
    <circle cx="132" cy="198" r="12" fill="url(#gold-grad)" stroke="#E5A93B" stroke-width="1.5" />
    <!-- Paw shape on medallion -->
    <circle cx="132" cy="198" r="3.5" fill="#D4AF37" />
    <circle cx="127" cy="193" r="2" fill="#D4AF37" />
    <circle cx="132" cy="191" r="2" fill="#D4AF37" />
    <circle cx="137" cy="193" r="2" fill="#D4AF37" />
  </g>
</svg>
