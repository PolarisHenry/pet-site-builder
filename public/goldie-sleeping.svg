<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#FF8C42" flood-opacity="0.15" />
    </filter>
    <filter id="bed-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#2D3142" flood-opacity="0.1" />
    </filter>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="100%" stop-color="#F5D061" />
    </linearGradient>
    <linearGradient id="sky-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3EDF7" />
      <stop offset="100%" stop-color="#A0C4FF" />
    </linearGradient>
  </defs>

  <!-- Background Glow -->
  <circle cx="200" cy="150" r="140" fill="url(#sky-gradient)" opacity="0.15" />

  <!-- The Pet Bed -->
  <g filter="url(#bed-shadow)">
    <!-- Outer Bed ring -->
    <ellipse cx="200" cy="165" rx="140" ry="85" fill="#A0C4FF" />
    <!-- Inner fluff ring -->
    <ellipse cx="200" cy="160" rx="115" ry="65" fill="#F4F4F6" />
    <!-- Shadows inside bed -->
    <ellipse cx="200" cy="163" rx="105" ry="55" fill="#E2E8F0" opacity="0.5" />
  </g>

  <!-- Sleeping Cat (Curled Up) -->
  <g filter="url(#soft-shadow)">
    <!-- Cat body (main circle) -->
    <path d="M 130 160 C 130 115, 270 115, 270 160 C 270 205, 130 205, 130 160 Z" fill="#FF8C42" />
    
    <!-- White patch on body/chest -->
    <path d="M 150 165 C 150 140, 230 140, 230 165 C 230 190, 150 190, 150 165 Z" fill="#FFFFFF" />

    <!-- Cat head (tucked in slightly) -->
    <circle cx="165" cy="145" r="32" fill="#FF8C42" />
    <!-- Head white face mask (snout area) -->
    <path d="M 140 150 C 140 135, 175 135, 185 145 C 190 150, 155 170, 140 150 Z" fill="#FFFFFF" />

    <!-- Left Ear -->
    <path d="M 140 132 L 132 110 L 155 122 Z" fill="#FF8C42" />
    <path d="M 143 129 L 138 115 L 152 123 Z" fill="#FFAD73" /> <!-- Ear inner -->

    <!-- Right Ear -->
    <path d="M 175 125 L 188 105 L 185 128 Z" fill="#FF8C42" />
    <path d="M 176 124 L 183 112 L 181 126 Z" fill="#FFAD73" /> <!-- Ear inner -->

    <!-- Sleepy Closed Eyes -->
    <path d="M 145 145 Q 150 149 155 145" fill="none" stroke="#2D3142" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 170 147 Q 174 151 178 147" fill="none" stroke="#2D3142" stroke-width="2.5" stroke-linecap="round" />

    <!-- Nose and Mouth -->
    <polygon points="160,152 164,152 162,154" fill="#FFAD73" />
    <path d="M 160 156 Q 162 158 164 156" fill="none" stroke="#2D3142" stroke-width="1.5" stroke-linecap="round" />

    <!-- Whiskers -->
    <line x1="135" y1="152" x2="120" y2="150" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" />
    <line x1="135" y1="156" x2="118" y2="158" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" />
    <line x1="182" y1="154" x2="195" y2="152" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" />
    <line x1="182" y1="158" x2="196" y2="160" stroke="#E2E8F0" stroke-width="1.5" stroke-linecap="round" />

    <!-- Curled Tail -->
    <path d="M 255 170 C 275 175, 285 155, 275 140 C 270 132, 260 135, 262 143 C 265 150, 255 160, 245 162" fill="none" stroke="#FF8C42" stroke-width="18" stroke-linecap="round" />
    <!-- White tail tip -->
    <path d="M 275 140 C 272 135, 263 135, 262 143" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" />

    <!-- Collar and Gold Tag -->
    <path d="M 155 170 Q 165 173 175 166" fill="none" stroke="#D32F2F" stroke-width="4" stroke-linecap="round" />
    <!-- Gold Medallion -->
    <circle cx="166" cy="176" r="10" fill="url(#gold-gradient)" stroke="#E5A93B" stroke-width="1" />
    <!-- Embossed paw print on medallion -->
    <circle cx="166" cy="176" r="3" fill="#D4AF37" />
    <circle cx="162" cy="172" r="1.5" fill="#D4AF37" />
    <circle cx="166" cy="170" r="1.5" fill="#D4AF37" />
    <circle cx="170" cy="172" r="1.5" fill="#D4AF37" />
  </g>

  <!-- Sweet Zzzs floating up -->
  <g fill="#8D99AE" font-family="Quicksand, sans-serif" font-weight="bold">
    <text x="260" y="90" font-size="14" opacity="0.8" transform="rotate(-15 260 90)">Z</text>
    <text x="275" y="70" font-size="18" opacity="0.6" transform="rotate(-10 275 70)">Z</text>
    <text x="295" y="45" font-size="24" opacity="0.4" transform="rotate(-5 295 45)">Z</text>
  </g>
</svg>
